<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizar documento Word</title>
    <style>
        .contenedor-word {
            width: 100%;
            max-width: 900px;
            margin: 20px auto;
            text-align: center;
        }
        iframe {
            width: 100%;
            height: 600px;
            border: 2px solid #ccc;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="contenedor-word">
        <h2>Visor de Documento Word</h2>
        <!-- REEMPLAZA "URL_DE_TU_ARCHIVO.docx" por el enlace real de tu documento -->
        <iframe src="https://docs.google.com/document/d/18DqpgkRh-EJCSBLzKEicRKU4zdqZ80bw/edit?usp=sharing&ouid=116083951560166827010&rtpof=true&sd=true" width="476" height="288" frameborder="0" scrolling="no"></iframe>
    </div>

</body>
</html>
